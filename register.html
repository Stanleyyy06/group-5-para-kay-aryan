<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Register</title>
    <style>
      body {font-family: Arial, sans-serif; background:#f4f4f9; margin:0; padding:0;}
      .container {max-width:420px; margin:72px auto; padding:32px; background:white; border-radius:12px; box-shadow:0 12px 30px rgba(0,0,0,0.08);}
      h1 {margin-bottom:20px;}
      input {width:100%; padding:12px; margin:8px 0; border:1px solid #ccc; border-radius:6px;}
      button {width:100%; padding:12px; margin-top:16px; border:none; border-radius:6px; background:#4f46e5; color:white; cursor:pointer;}
      .link {margin-top:12px; display:block; text-align:center; color:#4f46e5; text-decoration:none;}
      .flash {margin-bottom:16px; padding:12px; border-radius:6px;}
      .flash.success {background:#d1fae5; color:#065f46;}
      .flash.warning {background:#fef3c7; color:#92400e;}
      .flash.danger {background:#fee2e2; color:#991b1b;}
      .flash.info {background:#dbeafe; color:#1d4ed8;}
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Register</h1>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="password" name="confirm" placeholder="Confirm password" required>
        <button type="submit">Create Account</button>
      </form>
      <a class="link" href="{{ url_for('auth.login') }}">Already have an account? Login</a>
    </div>
  </body>
</html>
