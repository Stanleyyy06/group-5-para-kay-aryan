<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Camera</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            padding: 30px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .user {
            margin-bottom: 20px;
            color: #ccc;
        }

        video {
            width: 85%;
            max-width: 900px;
            border-radius: 12px;
            border: 4px solid white;
            background: black;
        }

        .status {
            margin-top: 20px;
            font-size: 18px;
        }

        .buttons {
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #4f46e5;
            color: white;
            cursor: pointer;
            font-size: 16px;
            margin: 0 10px;
        }

        button:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Live Device Camera</h1>

    <div class="user">
        Logged in as:
        <strong>{{ username }}</strong>
    </div>

    <video id="video" autoplay playsinline></video>

    <div class="status" id="status">
        Waiting for camera access...
    </div>

    <div class="buttons">
        <button onclick="startCamera()">
            Start Camera
        </button>

        <button onclick="window.location.href='{{ url_for('auth.logout') }}'">
            Logout
        </button>
    </div>

</div>

<script>
    async function startCamera() {
        const status = document.getElementById("status");

        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: true,
                audio: false
            });

            document.getElementById("video").srcObject = stream;

            status.innerHTML = "Camera Status: LIVE";

        } catch (error) {
            console.error(error);

            status.innerHTML =
                "Camera access denied or unavailable.";
        }
    }

    startCamera();
</script>

</body>
</html>
